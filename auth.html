<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxo - Login / Sign Up</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-split-layout">
            <div class="auth-left-bar">
                <div class="auth-card">
            <div class="logo" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px;">
                <i class="ph-fill ph-aperture" style="color: var(--color-accent); font-size: 48px;"></i>
                <span class="logo-text">Voxo</span>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Log In</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active-form">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-submit-btn">Log In</button>
                <div class="auth-message error" id="loginError"></div>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <div class="input-group">
                    <input type="email" id="signupEmail" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Password" required minlength="6">
                </div>
                <div class="input-group">
                    <input type="text" id="signupUsername" placeholder="Username" required>
                </div>
                <button type="submit" class="auth-submit-btn">Sign Up</button>
                <div class="auth-message error" id="signupError"></div>
                <div class="auth-message success" id="signupSuccess"></div>
            </form>
            
            <div class="auth-footer">
                <p>By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.</p>
            </div>
        </div>
        </div>
        <div class="auth-right-image"></div>
    </div>
</div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="auth.js"></script>
</body>
</html>
