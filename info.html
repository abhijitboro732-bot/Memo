<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Voxo Center</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .info-container {
            display: flex;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .info-sidebar {
            width: 300px;
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .info-sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            cursor: pointer;
        }
        .info-nav-link {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .info-nav-link:hover {
            background: var(--bg-hover);
        }
        .info-nav-link.active {
            background: var(--bg-hover);
            color: var(--color-accent);
        }
        .info-content-area {
            flex-grow: 1;
            padding: 48px;
            max-width: 900px;
            overflow-y: auto;
        }
        .info-content-header {
            margin-bottom: 32px;
        }
        .info-content-header h1 {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .info-content-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }
        .info-body {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 15px;
        }
        .info-body h2 {
            color: var(--text-primary);
            margin: 24px 0 12px;
            font-size: 20px;
        }
        .info-card {
            background: var(--bg-hover);
            border-radius: 12px;
            padding: 32px;
            margin-top: 24px;
            border: 1px solid var(--border-color);
        }
        @media (max-width: 768px) {
            .info-container {
                flex-direction: column;
            }
            .info-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .info-content-area {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="info-container">
        <!-- Sidebar -->
        <aside class="info-sidebar">
            <div class="info-sidebar-header" onclick="window.location.href='index.html'">
                <i class="ph-fill ph-aperture" style="color: var(--color-accent); font-size: 32px;"></i>
                <span class="logo-text" style="font-size: 20px; font-weight: 700;">Voxo Center</span>
            </div>
            
            <nav id="infoNav">
                <a href="?page=about" class="info-nav-link" data-page="about"><i class="ph ph-info"></i> About</a>
                <a href="?page=help" class="info-nav-link" data-page="help"><i class="ph ph-question"></i> Help</a>
                <a href="?page=press" class="info-nav-link" data-page="press"><i class="ph ph-newspaper"></i> Press</a>
                <a href="?page=api" class="info-nav-link" data-page="api"><i class="ph ph-code"></i> API</a>
                <a href="?page=jobs" class="info-nav-link" data-page="jobs"><i class="ph ph-briefcase"></i> Jobs</a>
                <a href="?page=privacy" class="info-nav-link" data-page="privacy"><i class="ph ph-lock-key"></i> Privacy</a>
                <a href="?page=terms" class="info-nav-link" data-page="terms"><i class="ph ph-file-text"></i> Terms</a>
                <a href="?page=locations" class="info-nav-link" data-page="locations"><i class="ph ph-map-pin"></i> Locations</a>
                <a href="?page=language" class="info-nav-link" data-page="language"><i class="ph ph-globe"></i> Language</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="info-content-area">
            <div class="info-content-header">
                <h1 id="pageTitle">Information</h1>
                <p id="pageSubtitle">Select a topic from the sidebar.</p>
            </div>
            
            <div class="info-card">
                <div class="info-body" id="pageContent">
                    Loading content...
                </div>
            </div>
        </main>
    </div>

    <script>
        const infoData = {
            about: { 
                title: 'About Voxo', 
                subtitle: 'Learn more about our mission and vision.',
                content: 'Voxo is a next-generation social network designed to bring people together. <h2>Our Mission</h2> To connect people through authentic experiences and build a global community that fosters creativity and friendship.' 
            },
            help: { 
                title: 'Help Center', 
                subtitle: 'Find answers, support, and guidance.',
                content: 'Need assistance? You are in the right place. <h2>Popular Topics</h2><ul><li>How to reset your password</li><li>Managing your privacy settings</li><li>Reporting a problem</li></ul>' 
            },
            press: { 
                title: 'Press & Media', 
                subtitle: 'Get the latest news and brand assets.',
                content: 'For press inquiries, please reach out to press@voxo.app. <h2>Resources</h2> We offer a variety of brand assets and press kits for media professionals. Please contact our PR team to gain access.' 
            },
            api: { 
                title: 'API Documentation', 
                subtitle: 'Build amazing integrations with Voxo.',
                content: 'Integrate your applications with Voxo using our developer API. <h2>Getting Started</h2> You will need to register an application in the developer portal to get your API keys. Review our endpoint documentation for rate limits and available methods.' 
            },
            jobs: { 
                title: 'Careers at Voxo', 
                subtitle: 'Help us shape the future of social networking.',
                content: 'Join the Voxo team! We are looking for passionate individuals driven by innovation. <h2>Open Positions</h2><ul><li>Senior Frontend Engineer - React/Node</li><li>Product Designer</li><li>Community Manager</li></ul>' 
            },
            privacy: { 
                title: 'Privacy Policy', 
                subtitle: 'What is the Privacy Policy and what does it cover?',
                content: 'We value your privacy. Your data is encrypted and never sold. <h2>Information We Collect</h2> We collect information you provide directly to us, such as when you create an account, post content, or communicate with others. <h2>How We Use Information</h2> We use the information we collect to provide, maintain, and improve our services, as well as to develop new features.' 
            },
            terms: { 
                title: 'Terms of Service', 
                subtitle: 'Rules and guidelines for using Voxo.',
                content: 'By using Voxo, you agree to our terms and community guidelines. <h2>User Conduct</h2> You agree not to violate any laws, infringe on intellectual property rights, or harass other users. <h2>Account Termination</h2> We reserve the right to suspend or terminate accounts that violate our terms.' 
            },
            locations: { 
                title: 'Locations', 
                subtitle: 'Voxo around the world.',
                content: 'Voxo is available globally. Find localized content for your region. <h2>Offices</h2> We have offices in San Francisco, London, and Tokyo.' 
            },
            language: { 
                title: 'Language Options', 
                subtitle: 'Customize your Voxo experience.',
                content: 'Voxo supports multiple languages to better serve our global community. <h2>Supported Languages</h2> Available in English, Spanish, French, German, Japanese, and more. You can change your language preference in your account settings.' 
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let currentPage = urlParams.get('page') || 'about';
        
        // If an invalid page is passed, fallback to 'about'
        if (!infoData[currentPage]) {
            currentPage = 'about';
        }

        // Set active nav link
        document.querySelectorAll('.info-nav-link').forEach(link => {
            if (link.getAttribute('data-page') === currentPage) {
                link.classList.add('active');
            }
        });

        // Set content
        document.getElementById('pageTitle').textContent = infoData[currentPage].title;
        document.getElementById('pageSubtitle').textContent = infoData[currentPage].subtitle;
        document.getElementById('pageContent').innerHTML = infoData[currentPage].content;
        
        // Update document title
        document.title = infoData[currentPage].title + ' | Voxo Center';
    </script>
</body>
</html>
